name: 🛡️ Basilisk CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  quality-check:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"
        enable-cache: true   # cache the .venv between runs for speed

    - name: Install dependencies
      run: uv sync --extra windows

    - name: Lint — syntax errors and undefined names
      run: uv run flake8 basilisk --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Lint — full analysis (warnings only)
      run: uv run flake8 basilisk --count --exit-zero --max-line-length=127 --statistics

    - name: Type Check
      run: uv run mypy basilisk

    - name: Security Scan
      run: uv run bandit -r basilisk -ll

    - name: Run Tests
      run: uv run pytest --tb=short