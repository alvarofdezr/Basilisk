# ============================================================
# Basilisk EDR — Example Configuration
# Copy to config.yaml and fill in your values.
# Secrets (API keys, password hashes) must go in .env — never here.
# ============================================================

system:
  version: "7.1.0"
  log_level: "INFO"   # DEBUG | INFO | WARNING | ERROR

monitoring:
  directories:
    - "./test_folder"
  log_file: "server_logs.txt"

database:
  name: "basilisk.db"

network:
  whitelist:
    - "chrome.exe"
    - "firefox.exe"
    - "msedge.exe"
    - "svchost.exe"
    - "python.exe"

# ============================================================
# All secrets must be set via environment variables or .env:
#
#   BASILISK_ADMIN_PASSWORD_HASH  — Argon2id hash of admin password
#   BASILISK_SERVER_SECRET_KEY    — Random 32+ char session key
#   BASILISK_AGENT_TOKEN          — Shared token for agent authentication
#   BASILISK_C2_URL               — https://<server-ip>:8443
#   BASILISK_VIRUSTOTAL_API_KEY   — VirusTotal API v3 key (optional)
#   BASILISK_TELEGRAM_TOKEN       — Telegram bot token (optional)
#   BASILISK_TELEGRAM_CHAT_ID     — Telegram chat ID (optional)
# ============================================================